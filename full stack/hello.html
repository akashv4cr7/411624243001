<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Example</title>
</head>
<body>

    <h2>Array and Function Example</h2>

    <script>
        // Array
        let arr = [1, 2, 3, 4, 5];

        document.write("<h3>Array Elements Doubled:</h3>");

        // Loop through array and multiply each element by 2
        for (let i = 0; i < arr.length; i++) {
            document.write(arr[i] * 2 + " ");
        }

        document.write("<br><br>");

        // Function to add two numbers
        function add(a, b) {
            return a + b;
        }

        let result = add(10, 20);

        document.write("<h3>Addition Result:</h3>");
        document.write("10 + 20 = " + result);
    </script>

</body>
</html>
